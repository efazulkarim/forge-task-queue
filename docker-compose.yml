services:
  redis:
    image: redis:7-alpine
    container_name: buraq_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: buraq_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    restart: unless-stopped
    depends_on:
      - redis

  grafana:
    image: grafana/grafana:latest
    container_name: buraq_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped
    depends_on:
      - prometheus

  buraq:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: buraq_app
    ports:
      - "8080:8080"
      - "2112:2112"
    environment:
      - REDIS_ADDR=redis:6379
      - WORKER_COUNT=${WORKER_COUNT:-5}
      - API_KEY=${API_KEY:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
      - ENABLE_MOCK_TASKS=${ENABLE_MOCK_TASKS:-true}
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  redis_data:
  prometheus_data:
  grafana_data:
